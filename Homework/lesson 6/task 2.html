<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form</title>
</head>
 <style>
   body{
     height: 100vh;
     margin: 0;
     background-color: darkcyan;
     display: flex;
     justify-content: center;
     align-items: center;

   }
   .form-registration{
       width: 45vw;
       height: 50vh;
       background-color: #d6d0d0;
       border-radius: 20px;
   }

 </style>
<body>
 <div>
   <div>
  <h1>Вхід в особистий кабінет</h1>
   </div>

    <input type="password" name="password">
      <div>
          <label>
              Запамятати мене
              <input type="checkbox" name="remember">
          </label>
          <input type="submit" value="Вхід">
      </div>
  </form>
</div>
</body>
</html>
